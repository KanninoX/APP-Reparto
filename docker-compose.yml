version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: appreparto-db
    environment:
      POSTGRES_DB: appreparto
      POSTGRES_USER: appreparto
      POSTGRES_PASSWORD: appreparto123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appreparto"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: appreparto-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@appreparto.cl
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
